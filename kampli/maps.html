<!-- this is the kampli map  -->
     <!DOCTYPE html>
<html>
<head>
<title>Kampli Karnataka Map</title>
<link rel="stylesheet" href="style.css">

<style>

    
.title{
    margin-top:20px;
    color:#333;
}

.map-container{
    width:80%;
    margin:auto;
    margin-top:30px;
    border:4px solid #333;
    border-radius:10px;
    overflow:hidden;
}

.map-container iframe{
    width:100%;
    height:450px;
}
</style>
</head>


<body>

<h2 class="title">Kampli Karnataka Map</h2>

<div class="map-container">
<iframe 
src="https://maps.google.com/maps?q=Kampli%20Karnataka&t=&z=13&ie=UTF8&iwloc=&output=embed"
frameborder="0"
scrolling="no"
marginheight="0"
marginwidth="0">
</iframe>
</div>


</body>
</html>
